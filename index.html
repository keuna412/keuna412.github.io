<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://keuna412.github.io/">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="google-site-verification" content="W5kaaSAZNfMooPAz_azrNeGFjLHzY2itqvlQNCqokaY" />
  
  <title>Helle Library</title>

<meta name="description"
      content="A quiet library drifting through space. Explore books, music, and stories among the stars.">

 <link rel="icon" href="/favicon.ico" sizes="any">
 <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1496159019877787"
     crossorigin="anonymous"></script>
</head>
  
  <style>

@font-face {
  font-family: "Galmuri";
  src: url("fonts/Galmuri.ttf") format("truetype");
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  background-color: rgb(32, 22, 45);
  position: relative;

  font-family: "Galmuri", sans-serif;
}

/* 기본 스케일 변수 */
:root {
  --scale: 1;
}

.world {
  width: 1920px;
  height: 1080px;

  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(var(--scale));

  background-image: url("HL00.jpg");
  background-size: cover;
  background-position: center;
}

.welcome-title h1 {

  margin: 0;

  font-size: 59px;

}
.welcome-description p {

  margin: 0;

  font-size: 28px;

  line-height: 1.4;

}
.welcome-title,
.welcome-description {

  color: #F7F0B5;

  text-align: center;

}
.welcome-title {
  position: absolute;
    width: 100%;
    top: 240px;
    text-align: center;
}

.welcome-description {
  position: absolute;
    width: 100%;
    top: 675px;
    text-align: center;
}

/* 우주선 */
.spaceship {
  width: 13%;
  min-width: 140px;
  max-width: 260px;

  position: absolute;
  top: 46%;
  left: 56%;

  transform: translate(-50%, -50%);
  cursor: pointer;

  /* 🔥 추가 */
  transition:
    transform 0.25s,
    filter 0.25s;
}

/* 🔥 hover 효과 추가 */
.spaceship:hover {
  filter:
    brightness(1.25)
    drop-shadow(0 0 12px rgba(255,255,255,0.45));

  transform:
    translate(-50%, -50%)
    scale(1.08);
}

/* 📱 모바일 대응 */
@media (max-width: 768px) {

  :root {
    --scale: 0.45;
  }

}

  </style>
</head>

<body>

  <div class="world">
  
<div class="welcome-title">
  <h1>Welcome to Helle Library!</h1>
</div>

<div class="welcome-description">
  <p>
    This is Earth's Neighborhood Space Library.<br>
    You can come in and study, work or relax.<br>
    Please click on the spacecraft to enter.
  </p>
</div>
    <a href="library.html">
      <img src="spaceship.gif" class="spaceship">
    </a>

  </div>

</body>
</html>
