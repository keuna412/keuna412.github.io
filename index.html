<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Helle Library</title>

  <style>

body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  background-color: rgb(32, 22, 45);
  position: relative;
}

/* 기본 스케일 변수 */
:root {
  --scale: 1;
}

.world {
  width: 1920px;
  height: 1080px;

  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(var(--scale));

  background-image: url("HL00_.jpg");
  background-size: cover;
  background-position: center;
}

/* 우주선 */
.spaceship {
  width: 13%;
  min-width: 140px;
  max-width: 260px;

  position: absolute;
  top: 49%;
  left: 56%;

  transform: translate(-50%, -50%);
  cursor: pointer;

  /* 🔥 추가 */
  transition:
    transform 0.25s,
    filter 0.25s;
}

/* 🔥 hover 효과 추가 */
.spaceship:hover {
  filter:
    brightness(1.25)
    drop-shadow(0 0 12px rgba(255,255,255,0.45));

  transform:
    translate(-50%, -50%)
    scale(1.08);
}

/* 📱 모바일 대응 */
@media (max-width: 768px) {

  :root {
    --scale: 0.45;
  }

}

  </style>
</head>

<body>

  <div class="world">

    <a href="library.html">
      <img src="spaceship.gif" class="spaceship">
    </a>

  </div>

</body>
</html>
