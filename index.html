  <title>Helle Library</title>

  <style>

    body {
  margin: 0;
  overflow: hidden;
  height: 100vh;

}

.world {

    .spaceship {
      width: 13%;
min-width: 140px;

      position: absolute;

      top: 49%;
      left: 56%;

      transform: translate(-50%, -50%);

      cursor: pointer;
    }

  </style>

<body>
