<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Helle Library</title>

  <style>

    body {
      margin: 0;
      overflow-x: scroll;
      overflow-y: hidden;
    }

    .world {
      width: 1920px;
      height: 1080px;

      position: relative;
      overflow: hidden;
    }

    .bg-video {
      width: 100%;
      height: 100%;

      object-fit: cover;
    }

  </style>
</head>

<body>

  <div class="world">

    <video autoplay loop muted playsinline class="bg-video">
      <source src="library.mp4" type="video/mp4">
    </video>

    <audio autoplay loop id="bgm">
      <source src="library_noise.mp3" type="audio/mpeg">
    </audio>

  </div>

</body>
</html>
