<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Helle Library</title>

  <style>

   body {
  margin: 0;
  overflow: hidden;
}

.library {
  display: flex;
  width: 400vw; /* 화면 4개 */
  height: 100vh;

  overflow-x: scroll;
  scroll-snap-type: x mandatory;
}

.room {
  width: 100vw;
  height: 100vh;

  flex-shrink: 0;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 40px;
  color: white;
}

/* 스냅 (딱딱 끊기게 이동) */
.room {
  scroll-snap-align: start;
}
  </style>
</head>

<body>

  <div class="world">

    <video autoplay loop muted playsinline class="bg-video">
      <source src="library.mp4" type="video/mp4">
    </video>

    <audio autoplay loop id="bgm">
      <source src="library_noise.mp3" type="audio/mpeg">
    </audio>

  </div>

</body>
</html>
