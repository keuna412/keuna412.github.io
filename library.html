<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Helle Library</title>

<style>

body {
  margin: 0;
  overflow: hidden;
}

/* 스와이프 컨테이너 */
.library {
  display: flex;
  width: 300vw;
  height: 100vh;

  overflow-x: auto;
  overflow-y: hidden;

  scroll-snap-type: x mandatory;
}

/* 각 방 */
.room {
  width: 100vw;
  height: 100vh;

  flex-shrink: 0;

  position: relative;

  scroll-snap-align: start;
}

/* 영상 */
.bg-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 텍스트 (임시) */
.placeholder {
  position: absolute;
  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%);
  color: white;
  font-size: 40px;
}

</style>
</head>

<body>

<div class="library">

  <section class="room">
    <video autoplay loop muted playsinline class="bg-video">
      <source src="library.mp4" type="video/mp4">
    </video>
  </section>

  <section class="room">
    <div class="placeholder">서고</div>
  </section>

  <section class="room">
    <div class="placeholder">열람실</div>
  </section>

</div>

<audio autoplay loop id="bgm">
  <source src="library_noise.mp3" type="audio/mpeg">
</audio>

</body>
</html>
