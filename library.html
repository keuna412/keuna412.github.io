<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* 한 화면 고정 */
.world {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden
}

/* 영상 전체 보이기 */
.bg-video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background-color: black;
}

</style>
</head>

<body>

<div class="world">

  <video autoplay loop muted playsinline class="bg-video">
    <source src="library.mp4" type="video/mp4">
  </video>

</div>

<audio autoplay loop id="bgm">
  <source src="library_noise.mp3" type="audio/mpeg">
</audio>

</body>
</html>
